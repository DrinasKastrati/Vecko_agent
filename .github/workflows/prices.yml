name: Hämta kurser (prices.json)

on:
  schedule:
    # 1. Kör varje halvtimme (:00 och :30) från 07:00 till 20:00 UTC på vardagar
    # Detta täcker den aktiva handelsdagen för både Europa och USA.
    - cron: "0,30 7-20 * * 1-5"
    
    # 2. Dina specifika stängningstider ligger kvar för att garantera exakt rätt minut
    - cron: "0 5 * * 1-5"    # 05:00 UTC (~07:00 CEST) vardagar – justera till FÖRE din routine
    - cron: "0 6 * * 1-5"    # extra säkerhetskörning 06:00 UTC
    - cron: "45 16 * * 1-5"  # efter Stockholm-stängning (17:30 CET/CEST = 15:30–16:30 UTC) – ger riktiga stängningskurser i price_history
    - cron: "10 21 * * 1-5"  # efter US-stängning (16:00 ET = 20:00–21:00 UTC) – scout/krypto-kurser
  
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Hämta kurser
        run: node .github/scripts/fetch-prices.mjs
      - name: Committa prices.json om ändrad
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/prices.json state/price_history.json
          if git diff --cached --quiet; then
            echo "Inga kursandringar - hoppar over commit."
          else
            git commit -m "Kurser: $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              if git pull --rebase --autostash -X theirs origin main && git push origin main; then
                exit 0
              fi
              git rebase --abort 2>/dev/null || true
              echo "Push-försök $i misslyckades (kollision med annan push?) – försöker igen..."
              sleep $((5 * i))
            done
            echo "Kunde inte pusha efter 3 försök."
            exit 1
          fi	
