name: Köa aktieanalys (issue -> analysis_queue.json)

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: analys-queue
  cancel-in-progress: false

jobs:
  queue:
    if: ${{ github.event.issue.user.login == github.repository_owner && startsWith(github.event.issue.title, 'analys:') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Lägg tickern i kön
        env:
          TITLE: ${{ github.event.issue.title }}
          NUM: ${{ github.event.issue.number }}
        run: |
          TICKER=$(printf '%s' "$TITLE" | sed -E 's/^[Aa]nalys:[[:space:]]*//' | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')
          node .github/scripts/queue-add.mjs "$TICKER" "$NUM"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/analysis_queue.json config/watchlist.txt config/watchlist_us.txt
          if git diff --cached --quiet; then
            echo "Inget att köa (tom eller redan i kön)."
          else
            git commit -m "Köa analys: $TICKER (issue #$NUM) + watchlist"
            git pull --rebase --autostash origin main || true
            git push
          fi
      - name: Kvittera och stäng issue
        uses: actions/github-script@v7
        with:
          script: |
            const t = context.payload.issue.title.replace(/^analys:\s*/i, '').trim().toUpperCase();
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Köad för analys: **${t}** (även tillagd i watchlist så priset hämtas nästa pris-körning). Analysen hamnar i \`reports/analysis/\` när Claude-arbetaren körts (kör "analysera kön" i Cowork). Ärendet stängs automatiskt.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed'
            });
